[phases.setup]
nixPkgs = ["nodejs_20", "php82", "composer"]

[phases.install]
cmds = [
  "composer install --no-scripts --no-interaction",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
